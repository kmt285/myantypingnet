<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Typing Practice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>မြန်မာလက်ကွက် လေ့ကျင့်ရန်</h1>
        
        <div class="stats">
            <p>ကျန်ရှိချိန်: <span id="time">60</span>s</p>
            <p>WPM: <span id="wpm">0</span></p>
            <p>မှန်ကန်မှု: <span id="accuracy">100</span>%</p>
        </div>

        <div class="text-display" id="text-display">
            စာသားများ ဤနေရာတွင် ပေါ်လာပါမည်...
        </div>

        <div class="input-area">
            <input type="text" id="text-input" placeholder="အပေါ်ကစာသားကို ဤနေရာတွင် ရိုက်ပါ..." autofocus>
        </div>

        <button id="restart-btn">ပြန်စရန်</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
