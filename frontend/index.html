<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Typing Basics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>မြန်မာလက်ကွက် အခြေခံ လေ့ကျင့်ရန်</h1>
        
        <div class="lesson-display">
            <span id="completed-text"></span>
            <span id="current-char">က</span>
            <span id="upcoming-text"> ခ ဂ ဃ င</span>
        </div>

        <input type="text" id="hidden-input" autocomplete="off" autofocus placeholder="ဒီနေရာမှာ Click နှိပ်ပြီး စာစရိုက်ပါ...">

        <div class="keyboard" id="virtual-keyboard">
            <div class="key-row">
                <kbd data-key="ဆ">ဆ</kbd>
                <kbd data-key="တ">တ</kbd>
                <kbd data-key="န">န</kbd>
                <kbd data-key="မ">မ</kbd>
                <kbd data-key="အ">အ</kbd>
                <kbd data-key="ပ">ပ</kbd>
                <kbd data-key="က">က</kbd>
                <kbd data-key="င">င</kbd>
                <kbd data-key="သ">သ</kbd>
                <kbd data-key="စ">စ</kbd>
                <kbd data-key="ဟ">ဟ</kbd>
                <kbd data-key="ဪ">ဪ</kbd>
            </div>
            <div class="key-row">
                <kbd data-key="ေ">ေ</kbd>
                <kbd data-key="ျ">ျ</kbd>
                <kbd data-key="ိ">ိ</kbd>
                <kbd data-key="်">်</kbd>
                <kbd data-key="ါ">ါ</kbd>
                <kbd data-key="့">့</kbd>
                <kbd data-key="ြ">ြ</kbd>
                <kbd data-key="ု">ု</kbd>
                <kbd data-key="ူ">ူ</kbd>
                <kbd data-key="း">း</kbd>
                <kbd data-key="ွ">ွ</kbd>
            </div>
            <div class="key-row">
                <kbd data-key="ဖ">ဖ</kbd>
                <kbd data-key="ထ">ထ</kbd>
                <kbd data-key="ခ">ခ</kbd>
                <kbd data-key="လ">လ</kbd>
                <kbd data-key="ဘ">ဘ</kbd>
                <kbd data-key="ည">ည</kbd>
                <kbd data-key="ာ">ာ</kbd>
                <kbd data-key="၊">၊</kbd>
                <kbd data-key="။">။</kbd>
                <kbd data-key="၏">၏</kbd>
            </div>
            <div class="key-row">
                <kbd data-key=" " class="space-key">Space</kbd>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
